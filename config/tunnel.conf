# Ollama Browser Wrapper - Configuration
# ========== ========================
# For local machine (Mac/Linux/Windows)

# === OLLAMA BACKEND ===
OLLAMA_HOST=http://localhost:11434

# === MODEL ===
# Change this to your preferred model!
OLLAMA_MODEL=qwen3.5:latest

OLLAMA_DEFAULT_MODEL=qwen3.5:latest

# === BATCHING/QUEUING MODE ===
BATCH_REQUESTS=true
MAX_QUEUE_SIZE=10

# === NETWORK ===
HOST=0.0.0.0
PORT=8080

# === SECURITY ===
SECRET_TOKEN=
RATE_LIMIT_PER_MINUTE=10
