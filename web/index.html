<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leash</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Datatype:wght@100..900&family=Iosevka+Charon:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&family=Roboto:ital,wght@0,100..900;1,100..900&family=Teachers:ital,wght@0,400..800;1,400..800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ebe4e8;
            --surface: #f3eef1;
            --text: #3a3438;
            --text-muted: #6f666b;
            --accent: #8f5a72;
            --accent-hover: #7a4d62;
            --border: #c9b9c2;
            --user-msg: #e2d7dd;
            --ai-msg: #f7f2f5;
            --system-msg-bg: #d9cdd4;
            --online: #4a7c59;
            --offline: #a85a6e;
            --hot-pink: #ff1493;
            --line: 1px solid var(--border);
            --chat-border: 3px solid var(--hot-pink);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Datatype', 'Teachers', 'Roboto', 'Iosevka Charon', ui-monospace, monospace;
            background: var(--bg);
            color: var(--text);
            padding: 16px;
            line-height: 1.55;
            min-height: 100dvh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            border: var(--line);
            padding: 16px;
            background: var(--surface);
        }
        header {
            text-align: center;
            margin-bottom: 16px;
            padding: 16px;
            background: var(--bg);
            position: relative;
            border: var(--line);
        }
        h1 { font-size: 1.35rem; font-weight: 700; margin-bottom: 8px; color: var(--text); }
        .subtitle { font-size: 0.8125rem; color: var(--text-muted); max-width: 28rem; margin: 0 auto; }
        .controls { position: absolute; top: 8px; right: 8px; display: flex; flex-direction: column; gap: 4px; }
        .control-btn {
            padding: 6px 10px;
            font-size: 0.75rem;
            font-family: inherit;
            background: var(--surface);
            border: var(--line);
            color: var(--text);
            cursor: pointer;
            text-align: center;
            min-width: 80px;
        }
        .control-btn:hover { background: var(--bg); }
        .model-dropdown {
            position: absolute;
            top: 36px;
            right: 8px;
            background: var(--surface);
            padding: 8px;
            z-index: 100;
            display: none;
            border: var(--line);
            max-height: 240px;
            overflow-y: auto;
            min-width: 200px;
            text-align: left;
        }
        .model-dropdown.show { display: block; }
        .model-dropdown h4 { margin-bottom: 8px; font-size: 0.85rem; color: var(--text-muted); padding-bottom: 6px; border-bottom: var(--line); }
        .model-option {
            padding: 6px 8px;
            margin-bottom: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            color: var(--text);
            word-break: break-all;
            border: 1px solid transparent;
        }
        .model-option:hover { background: var(--surface); border-color: var(--border); }
        .model-option.selected { background: var(--user-msg); border-color: var(--border); font-weight: 600; }
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding: 10px 12px;
            background: var(--bg);
            font-size: 0.8rem;
            gap: 12px;
            flex-wrap: wrap;
            border: var(--line);
        }
        .status-indicator { display: inline-flex; align-items: center; gap: 8px; color: var(--text-muted); }
        .status-dot {
            width: 12px;
            height: 12px;
            flex-shrink: 0;
            border: var(--line);
            background: var(--surface);
        }
        .status-dot.online { background: var(--online); }
        .status-dot.offline { background: var(--offline); }
        .message-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 12px;
            max-height: min(55vh, 480px);
            overflow-y: auto;
            padding: 8px;
            border: var(--line);
            background: var(--bg);
        }
        .message {
            padding: 10px 12px;
            line-height: 1.5;
            word-wrap: break-word;
            animation: fadeIn 0.2s ease;
            white-space: pre-wrap;
            border: var(--line);
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .message.user { background: var(--user-msg); align-self: flex-end; color: var(--text); }
        .message.ai { background: var(--ai-msg); align-self: flex-start; color: var(--text); }
        .message.system { background: var(--system-msg-bg); align-self: center; font-size: 0.85rem; color: var(--text-muted); }
        .input-area { display: flex; gap: 8px; margin-top: 12px; align-items: flex-end; }
        .input-wrapper {
            flex: 1;
            position: relative;
            border: var(--chat-border);
            background: var(--surface);
        }
        textarea#user-input {
            width: 100%;
            padding: 10px 12px;
            border: none;
            background: transparent;
            color: var(--text);
            font-size: 1rem;
            font-family: inherit;
            resize: vertical;
            min-height: 52px;
            max-height: 160px;
        }
        textarea#user-input::placeholder { color: var(--text-muted); opacity: 0.85; }
        textarea#user-input:focus { outline: none; }
        #send-btn {
            padding: 12px 20px;
            border: var(--line);
            background: var(--accent);
            color: #fff;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            font-size: 1rem;
        }
        #send-btn:hover { background: var(--accent-hover); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .model-status { font-size: 0.75rem; margin-top: 10px; color: var(--text-muted); border-top: var(--line); padding-top: 8px; }
        .footer-hint { margin-top: 12px; font-size: 0.75rem; color: var(--text-muted); text-align: center; border: var(--line); padding: 8px; background: var(--bg); }
        .text-muted { color: var(--text-muted); }
        .text-error { color: var(--offline); }
        .model-info strong { color: var(--text); font-weight: 700; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Phone harness</h1>
            <p class="subtitle" id="page-subtitle">Local Ollama (e.g. Qwen 3.5) — open this page from your tunnel URL</p>
            <div class="controls">
                <button type="button" class="control-btn" id="model-btn">Model</button>
                <button type="button" class="control-btn" id="clear-btn">Clear</button>
            </div>
            <div class="model-dropdown" id="model-dropdown" aria-hidden="true">
                <h4>Models</h4>
                <div id="model-list"></div>
            </div>
            <div class="model-status" id="model-badge">Model: …</div>
        </header>

        <div class="status-bar">
            <div class="status-indicator">
                <span class="status-dot offline" id="connection-dot"></span>
                <span id="status-text">Connecting…</span>
            </div>
            <div class="model-info" id="model-info"></div>
        </div>

        <div id="message-list" class="message-list">
            <div class="message system">Pick a model, then chat. Same origin as this page — works behind ngrok or Cloudflare Tunnel.</div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="user-input" placeholder="Message…" autocomplete="off" aria-label="Message input"></textarea>
            </div>
            <button type="button" id="send-btn">Send</button>
        </div>

        <p class="footer-hint"><span id="model-name">…</span></p>
    </div>
    <script>
        const API_BASE = window.location.origin;

        const statusDot = document.getElementById('connection-dot');
        const statusText = document.getElementById('status-text');
        const modelInfo = document.getElementById('model-info');
        const modelBadge = document.getElementById('model-badge');
        const modelNameEl = document.getElementById('model-name');
        const modelBtn = document.getElementById('model-btn');
        const modelDropdown = document.getElementById('model-dropdown');
        const modelListEl = document.getElementById('model-list');
        const messageList = document.getElementById('message-list');
        const input = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        let busy = false;
        let serverBackend = 'ollama';
        let availableModels = [];
        let selectedModel = '';
        let conversationHistory = [
            { role: 'system', content: 'You are a helpful assistant. Answer clearly and concisely.' }
        ];

        function escapeHtml(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        function addMessage(role, htmlOrText, asHtml) {
            const div = document.createElement('div');
            div.className = 'message ' + role;
            div[asHtml ? 'innerHTML' : 'textContent'] = asHtml ? htmlOrText : htmlOrText;
            messageList.appendChild(div);
            messageList.scrollTop = messageList.scrollHeight;
            return div;
        }

        function setConnected(ok, msg) {
            statusDot.classList.toggle('online', ok);
            statusDot.classList.toggle('offline', !ok);
            statusText.textContent = msg;
        }

        function updateModelList() {
            modelListEl.innerHTML = '';
            availableModels.forEach((m) => {
                const div = document.createElement('div');
                div.className = 'model-option' + (m === selectedModel ? ' selected' : '');
                div.textContent = m;
                div.onclick = () => {
                    selectModel(m);
                    modelDropdown.classList.remove('show');
                };
                modelListEl.appendChild(div);
            });
        }

        function selectModel(m) {
            selectedModel = m;
            localStorage.setItem('ollama_model', m);
            modelBadge.textContent = 'Model: ' + m;
            modelNameEl.textContent = m;
            const short = m.includes(':') ? m.split(':')[0] : m;
            modelBtn.textContent = 'Model (' + short + ')';
            updateModelList();
        }

        function toggleModelDropdown() {
            const open = modelDropdown.classList.toggle('show');
            modelDropdown.setAttribute('aria-hidden', open ? 'false' : 'true');
            if (open) populateModels();
        }

        modelBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleModelDropdown();
        });
        document.addEventListener('click', () => {
            modelDropdown.classList.remove('show');
            modelDropdown.setAttribute('aria-hidden', 'true');
        });
        modelDropdown.addEventListener('click', (e) => e.stopPropagation());

        async function populateModels() {
            try {
                const response = await fetch(API_BASE + '/models');
                const data = await response.json();
                if (!response.ok || !Array.isArray(data.models)) {
                    setConnected(false, 'API error');
                    modelInfo.innerHTML = '<span class="text-error">Could not list models</span>';
                    return;
                }
                serverBackend = data.backend || 'ollama';
                const sub = document.getElementById('page-subtitle');
                if (sub) {
                    sub.textContent = serverBackend === 'pi'
                        ? 'Pi coding agent (RPC) — same folder as LEASH_PI_CWD on the server'
                        : 'Local Ollama (e.g. Qwen 3.5) — open this page from your tunnel URL';
                }
                availableModels = data.models.slice();
                const def = data.current_default || '';
                if (serverBackend === 'pi' && availableModels.length === 0 && def) {
                    availableModels = [def];
                }
                const saved = localStorage.getItem('ollama_model');
                if (saved && availableModels.includes(saved)) {
                    selectModel(saved);
                } else if (def && availableModels.includes(def)) {
                    selectModel(def);
                } else if (availableModels.length) {
                    selectModel(availableModels[0]);
                } else {
                    modelBadge.textContent = 'Model: (none)';
                    modelNameEl.textContent = serverBackend === 'pi' ? 'Set LEASH_PI_COMMAND' : 'Run ollama pull …';
                    setConnected(true, 'API up — no models');
                    modelInfo.innerHTML = '<span class="text-muted">' + (serverBackend === 'pi' ? 'Pi: ensure ollama provider / model in env' : 'Pull a model in Ollama') + '</span>';
                    return;
                }
                setConnected(true, serverBackend === 'pi' ? 'Pi' : 'Connected');
                const backendNote = serverBackend === 'pi' ? ' · <span class="text-muted">Pi RPC</span>' : '';
                modelInfo.innerHTML = '<span class="text-muted">Default:</span> <strong>' + escapeHtml(def) + '</strong>' + backendNote;
            } catch (err) {
                console.error(err);
                setConnected(false, 'Offline');
                modelInfo.innerHTML = '<span class="text-error">' + escapeHtml(err.message) + '</span>';
            }
        }

        async function sendMessage() {
            const text = input.value.trim();
            if (!text || busy || !selectedModel) return;

            input.value = '';
            busy = true;
            sendBtn.disabled = true;
            input.disabled = true;
            setConnected(true, 'Thinking…');

            conversationHistory.push({ role: 'user', content: text });
            addMessage('user', text, false);

            const aiEl = addMessage('ai', '…', false);
            try {
                const response = await fetch(API_BASE + '/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: conversationHistory,
                        model: selectedModel
                    })
                });
                const raw = await response.text();
                let data = {};
                try {
                    data = raw ? JSON.parse(raw) : {};
                } catch (_) {}

                if (!response.ok) {
                    conversationHistory.pop();
                    aiEl.remove();
                    const detail = data.detail != null
                        ? (typeof data.detail === 'string' ? data.detail : JSON.stringify(data.detail))
                        : raw || ('HTTP ' + response.status);
                    addMessage('system', detail, false);
                    return;
                }

                const reply = data.response || '';
                conversationHistory.push({ role: 'assistant', content: reply });
                aiEl.textContent = reply;
            } catch (err) {
                console.error(err);
                conversationHistory.pop();
                aiEl.remove();
                addMessage('system', err.message || 'Request failed', false);
            } finally {
                busy = false;
                sendBtn.disabled = false;
                input.disabled = false;
                setConnected(true, 'Connected');
            }
        }

        async function clearMessages() {
            if (serverBackend === 'pi') {
                try {
                    const r = await fetch(API_BASE + '/api/pi/new-session', { method: 'POST' });
                    if (!r.ok) {
                        const t = await r.text();
                        console.warn('Pi new-session:', r.status, t);
                    }
                } catch (e) {
                    console.warn(e);
                }
            }
            messageList.innerHTML = '';
            addMessage('system', serverBackend === 'pi' ? 'Pi session cleared.' : 'History cleared.', false);
            conversationHistory = [
                { role: 'system', content: 'You are a helpful assistant. Answer clearly and concisely.' }
            ];
        }

        document.getElementById('clear-btn').addEventListener('click', clearMessages);
        sendBtn.addEventListener('click', sendMessage);
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (!input.disabled) sendMessage();
            }
        });

        populateModels();
    </script>
</body>
</html>
