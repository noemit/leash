<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leash</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Datatype:wght@100..900&family=Iosevka+Charon:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&family=Roboto:ital,wght@0,100..900;1,100..900&family=Teachers:ital,wght@0,400..800;1,400..800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ebe4e8;
            --surface: #f3eef1;
            --text: #3a3438;
            --text-muted: #6f666b;
            --accent: #8f5a72;
            --accent-hover: #7a4d62;
            --border: #c9b9c2;
            --user-msg: #e2d7dd;
            --ai-msg: #f7f2f5;
            --system-msg-bg: #d9cdd4;
            --online: #4a7c59;
            --offline: #a85a6e;
            --hot-pink: #ff1493;
            --line: 1px solid var(--border);
            --chat-border: 3px solid var(--hot-pink);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }
        body {
            font-family: 'Datatype', 'Teachers', 'Roboto', 'Iosevka Charon', ui-monospace, monospace;
            background: var(--bg);
            color: var(--text);
            line-height: 1.55;
            display: flex;
            flex-direction: column;
            min-height: 100dvh;
            min-height: 100%;
        }
        .app {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            padding: 10px 12px;
            padding-bottom: max(10px, env(safe-area-inset-bottom, 0));
        }
        header {
            flex-shrink: 0;
            padding: 4px 0 10px;
        }
        h1 {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: 0.02em;
        }
        .status-bar {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 6px;
            padding: 8px 0 10px;
            font-size: 0.8rem;
            border-bottom: var(--line);
            margin-bottom: 8px;
        }
        .status-row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: nowrap;
            width: 100%;
            justify-content: space-between;
        }
        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            min-width: 0;
            flex: 1;
        }
        #status-text {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            flex-shrink: 0;
            border: var(--line);
            background: var(--surface);
            border-radius: 50%;
        }
        .status-dot.online { background: var(--online); border-color: var(--online); }
        .status-dot.offline { background: var(--offline); border-color: var(--offline); }
        .model-info { font-size: 0.8rem; color: var(--text-muted); width: 100%; }
        .model-info strong { color: var(--text); font-weight: 600; }
        .status-toolbar {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
            margin-left: 8px;
        }
        .pi-folder-inline[hidden] { display: none !important; }
        .toolbar-icon-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 32px;
            padding: 0;
            border: var(--line);
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            border-radius: 2px;
            font-family: inherit;
        }
        .toolbar-icon-btn:hover { background: var(--user-msg); }
        .toolbar-icon-btn[aria-expanded="true"] {
            background: var(--bg);
            border-color: var(--accent);
        }
        .toolbar-icon-btn svg { display: block; }
        .toolbar-icon-btn .help-mark {
            font-weight: 700;
            font-size: 15px;
            line-height: 1;
        }
        .pi-folder-drawer {
            display: none;
            width: 100%;
            margin-top: 8px;
            padding: 10px 12px;
            background: var(--surface);
            border: var(--line);
            font-size: 0.78rem;
        }
        .pi-folder-drawer.open { display: block; }
        .status-bar:not(.pi-mode) .pi-folder-drawer { display: none !important; }
        .slash-help-drawer {
            display: none;
            width: 100%;
            margin-top: 8px;
            padding: 10px 12px;
            background: var(--surface);
            border: var(--line);
            font-size: 0.78rem;
        }
        .slash-help-drawer.open { display: block; }
        .slash-help-drawer h3 {
            font-size: 0.88rem;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--text);
        }
        .slash-help-drawer .slash-cmd-list { margin: 0; }
        .slash-help-drawer .slash-cmd-list dt {
            margin-top: 10px;
            font-weight: 600;
            color: var(--text);
        }
        .slash-help-drawer .slash-cmd-list dt:first-child { margin-top: 0; }
        .slash-help-drawer .slash-cmd-list dd {
            margin: 4px 0 0 0;
            padding-left: 0;
            color: var(--text-muted);
            line-height: 1.45;
        }
        .slash-help-drawer code {
            font-size: 0.8rem;
            background: var(--bg);
            padding: 1px 5px;
            border: var(--line);
        }
        .pi-folder-drawer label {
            display: block;
            color: var(--text-muted);
            margin-bottom: 6px;
        }
        .pi-folder-drawer .pi-folder-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            margin-top: 10px;
        }
        .pi-folder-drawer input {
            width: 100%;
            padding: 8px 10px;
            border: var(--line);
            background: var(--bg);
            color: var(--text);
            font-family: inherit;
            font-size: 0.85rem;
        }
        .pi-folder-drawer button[type="button"]#pi-subpath-btn {
            padding: 8px 14px;
            border: var(--line);
            background: var(--accent);
            color: #fff;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .pi-folder-drawer button#pi-subpath-btn:hover { background: var(--accent-hover); }
        .pi-folder-drawer button#pi-subpath-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .pi-ws-hint {
            flex: 1 1 100%;
            font-size: 0.72rem;
            color: var(--text-muted);
            word-break: break-all;
            margin-top: 8px;
        }
        .chat-scroll-wrap {
            flex: 1;
            min-height: 0;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        .message-list {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 8px 0;
            padding-bottom: 12px;
            -webkit-overflow-scrolling: touch;
        }
        .scroll-down-hint {
            position: absolute;
            bottom: 8px;
            right: 10px;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: var(--line);
            background: var(--surface);
            color: var(--accent);
            box-shadow: 0 4px 14px rgba(58, 52, 56, 0.18);
            cursor: pointer;
            z-index: 4;
            align-items: center;
            justify-content: center;
            padding: 0;
            animation: scrollHintBounce 1.15s ease-in-out infinite;
        }
        .scroll-down-hint[hidden] {
            display: none !important;
        }
        .scroll-down-hint:not([hidden]) {
            display: flex;
        }
        .scroll-down-hint svg {
            display: block;
        }
        @keyframes scrollHintBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(7px); }
        }
        .message {
            padding: 10px 12px;
            line-height: 1.5;
            word-wrap: break-word;
            animation: fadeIn 0.2s ease;
            border: var(--line);
        }
        .message.user { white-space: pre-wrap; }
        .message.ai { white-space: normal; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .message.user { background: var(--user-msg); align-self: flex-end; max-width: 92%; color: var(--text); }
        .message.ai { background: var(--ai-msg); align-self: flex-start; max-width: 100%; color: var(--text); }
        .message.ai .md-body { word-wrap: break-word; overflow-wrap: break-word; }
        .message.ai .md-body p { margin: 0.45em 0; }
        .message.ai .md-body p:first-child { margin-top: 0; }
        .message.ai .md-body p:last-child { margin-bottom: 0; }
        .message.ai .md-body h1, .message.ai .md-body h2, .message.ai .md-body h3 {
            margin: 0.65em 0 0.35em;
            font-weight: 700;
            line-height: 1.25;
        }
        .message.ai .md-body h1 { font-size: 1.15rem; }
        .message.ai .md-body h2 { font-size: 1.05rem; }
        .message.ai .md-body h3 { font-size: 1rem; }
        .message.ai .md-body ul, .message.ai .md-body ol { margin: 0.4em 0; padding-left: 1.35em; }
        .message.ai .md-body li { margin: 0.2em 0; }
        .message.ai .md-body blockquote {
            margin: 0.5em 0;
            padding-left: 10px;
            border-left: 3px solid var(--border);
            color: var(--text-muted);
        }
        .message.ai .md-body pre {
            margin: 8px 0;
            padding: 8px 10px;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-word;
            background: var(--bg);
            border: var(--line);
            font-family: 'Iosevka Charon', ui-monospace, monospace;
            font-size: 0.86rem;
        }
        .message.ai .md-body code {
            font-family: 'Iosevka Charon', ui-monospace, monospace;
            font-size: 0.88em;
            background: var(--bg);
            padding: 1px 5px;
            border: var(--line);
        }
        .message.ai .md-body pre code { background: transparent; border: none; padding: 0; font-size: inherit; }
        .message.ai .md-body a { color: var(--accent); word-break: break-word; }
        .message.ai .md-body table { border-collapse: collapse; margin: 0.5em 0; font-size: 0.92em; }
        .message.ai .md-body th, .message.ai .md-body td {
            border: var(--line);
            padding: 4px 8px;
        }
        .message.system { background: var(--system-msg-bg); align-self: center; font-size: 0.85rem; color: var(--text-muted); max-width: 100%; }
        /* Pi stream: chronological segments (think → tool → think → answer) */
        .stream-timeline {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }
        .stream-timeline-persist { display: flex; flex-direction: column; gap: 12px; margin-bottom: 10px; width: 100%; }
        .stream-segment-label {
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 4px;
        }
        .stream-segment-thinking .stream-thinking-body {
            font-size: 0.78rem;
            color: var(--text-muted);
            white-space: pre-wrap;
            border-left: 3px solid var(--border);
            padding-left: 8px;
        }
        .stream-segment-reply .stream-main { white-space: pre-wrap; }
        .stream-thinking {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            white-space: pre-wrap;
            display: none;
            border-left: 3px solid var(--border);
            padding-left: 8px;
        }
        .stream-thinking:not(:empty) { display: block; }
        .stream-thinking.ai-thinking-persist { display: block; }
        .stream-main { white-space: pre-wrap; }
        .stream-tools { margin-top: 8px; font-size: 0.82rem; }
        .stream-tool-block {
            border: var(--line);
            background: var(--bg);
            padding: 8px 10px;
            margin-top: 0;
            font-family: 'Iosevka Charon', ui-monospace, monospace;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .stream-tool-block .tool-name { font-weight: 600; margin-bottom: 4px; color: var(--text); }
        .composer {
            flex-shrink: 0;
            position: sticky;
            bottom: 0;
            z-index: 2;
            padding-top: 10px;
            margin-top: 4px;
            background: linear-gradient(to bottom, transparent 0%, var(--bg) 12px);
            background-color: var(--bg);
            box-shadow: 0 -8px 24px var(--bg);
        }
        .input-area { display: flex; gap: 8px; align-items: flex-end; }
        .input-wrapper {
            flex: 1;
            position: relative;
            border: var(--chat-border);
            background: var(--surface);
        }
        textarea#user-input {
            width: 100%;
            padding: 10px 12px;
            border: none;
            background: transparent;
            color: var(--text);
            font-size: 1rem;
            font-family: inherit;
            resize: vertical;
            min-height: 48px;
            max-height: 160px;
        }
        textarea#user-input::placeholder { color: var(--text-muted); opacity: 0.85; }
        textarea#user-input:focus { outline: none; }
        #send-btn {
            padding: 12px 18px;
            border: var(--line);
            background: var(--accent);
            color: #fff;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            font-size: 1rem;
        }
        #send-btn:hover { background: var(--accent-hover); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .text-muted { color: var(--text-muted); }
        .text-error { color: var(--offline); }
    </style>
</head>
<body>
    <div class="app">
        <header>
            <h1>leash</h1>
        </header>

        <div class="status-bar" id="status-bar">
            <div class="status-row">
                <div class="status-indicator">
                    <span class="status-dot offline" id="connection-dot"></span>
                    <span id="status-text">Connecting…</span>
                </div>
                <div class="status-toolbar">
                    <div id="pi-folder-bar" class="pi-folder-inline" hidden>
                        <button type="button" id="pi-folder-toggle" class="toolbar-icon-btn" aria-expanded="false" aria-controls="pi-folder-drawer" title="Working folder (under LEASH_PI_CWD)">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                            </svg>
                        </button>
                    </div>
                    <button type="button" id="clear-chat-btn" class="toolbar-icon-btn" title="Clear conversation (same as /clear)" aria-label="Clear conversation">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                            <line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/>
                        </svg>
                    </button>
                    <button type="button" id="cmd-help-toggle" class="toolbar-icon-btn" aria-expanded="false" aria-controls="slash-help-drawer" title="Slash commands" aria-label="Command help">
                        <span class="help-mark" aria-hidden="true">?</span>
                    </button>
                </div>
            </div>
            <div id="pi-folder-drawer" class="pi-folder-drawer">
                <label for="pi-subpath-input">Subfolder relative to <code>LEASH_PI_CWD</code></label>
                <input type="text" id="pi-subpath-input" placeholder="e.g. projects/my-repo" autocomplete="off" />
                <div class="pi-folder-actions">
                    <button type="button" id="pi-subpath-btn">Set folder</button>
                </div>
                <span class="pi-ws-hint" id="pi-workspace-hint"></span>
            </div>
            <div id="slash-help-drawer" class="slash-help-drawer" role="region" aria-label="Slash commands">
                <h3>Slash commands</h3>
                <p class="text-muted" style="font-size:0.74rem;margin-bottom:8px;">Send with the Send button (same as a normal message).</p>
                <dl class="slash-cmd-list">
                    <dt><code>/clear</code> · <code>/reset</code></dt>
                    <dd>Clear this chat. In Pi mode, also starts a new agent session when the server can reach Pi.</dd>
                    <dt><code>/help</code> · <code>/commands</code></dt>
                    <dd>Open this panel.</dd>
                </dl>
                <p class="text-muted" style="font-size:0.72rem;margin-top:10px;">Toolbar: folder (Pi only), trash = clear, <strong>?</strong> = this help.</p>
            </div>
            <div class="model-info" id="model-info"></div>
        </div>

        <div class="chat-scroll-wrap">
            <div id="message-list" class="message-list"></div>
            <button type="button" id="scroll-down-hint" class="scroll-down-hint" hidden aria-label="Scroll to latest output">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M12 5v14M5 12l7 7 7-7"/>
                </svg>
            </button>
        </div>

        <div class="composer">
            <div class="input-area">
                <div class="input-wrapper">
                    <textarea id="user-input" placeholder="Message…  /help for commands" autocomplete="off" aria-label="Message input"></textarea>
                </div>
                <button type="button" id="send-btn">Send</button>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
    <script>
        const API_BASE = window.location.origin;

        const statusDot = document.getElementById('connection-dot');
        const statusText = document.getElementById('status-text');
        const modelInfo = document.getElementById('model-info');
        const messageList = document.getElementById('message-list');
        const scrollDownHint = document.getElementById('scroll-down-hint');
        const input = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const piFolderBar = document.getElementById('pi-folder-bar');
        const piFolderToggle = document.getElementById('pi-folder-toggle');
        const piFolderDrawer = document.getElementById('pi-folder-drawer');
        const piSubpathInput = document.getElementById('pi-subpath-input');
        const piSubpathBtn = document.getElementById('pi-subpath-btn');
        const piWorkspaceHint = document.getElementById('pi-workspace-hint');
        const statusBarEl = document.getElementById('status-bar');
        const clearChatBtn = document.getElementById('clear-chat-btn');
        const cmdHelpToggle = document.getElementById('cmd-help-toggle');
        const slashHelpDrawer = document.getElementById('slash-help-drawer');

        let busy = false;
        let clearing = false;
        let serverBackend = 'ollama';
        let availableModels = [];
        let selectedModel = '';
        /** Mirror of server session (full list including system); refreshed via /api/session and each /api/chat. */
        let conversationHistory = [];

        /** Pixels from bottom to treat as "following" live output (auto-scroll during stream). */
        const SCROLL_PIN_PX = 96;

        function isMessageListNearBottom() {
            const el = messageList;
            const room = el.scrollHeight - el.scrollTop - el.clientHeight;
            return room <= SCROLL_PIN_PX;
        }

        function scrollMessageListToBottom() {
            messageList.scrollTop = messageList.scrollHeight;
            updateScrollDownHint();
        }

        /** During streaming: only scroll if user was already near the bottom. */
        function maybeFollowStream() {
            if (isMessageListNearBottom()) {
                messageList.scrollTop = messageList.scrollHeight;
            }
            updateScrollDownHint();
        }

        function updateScrollDownHint() {
            if (!scrollDownHint) return;
            const overflow = messageList.scrollHeight > messageList.clientHeight + 4;
            const show = busy && overflow && !isMessageListNearBottom();
            scrollDownHint.hidden = !show;
        }

        messageList.addEventListener('scroll', function () {
            updateScrollDownHint();
        }, { passive: true });

        if (scrollDownHint) {
            scrollDownHint.addEventListener('click', function () {
                scrollMessageListToBottom();
            });
        }

        function escapeHtml(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        function renderAssistantMarkdown(text) {
            const t = typeof text === 'string' ? text : '';
            if (!t.trim()) return '';
            if (typeof marked !== 'undefined' && typeof DOMPurify !== 'undefined') {
                const parse = marked.parse || marked;
                const raw = parse(t, { breaks: true, gfm: true });
                return DOMPurify.sanitize(raw);
            }
            return escapeHtml(t).replace(/\n/g, '<br>');
        }

        /**
         * Strip live "Answer" stream from a timeline clone so we do not duplicate final markdown.
         */
        function timelinePersistHtml(timelineEl) {
            if (!timelineEl) return '';
            const clone = timelineEl.cloneNode(true);
            clone.querySelectorAll('.stream-segment-reply').forEach(function (n) {
                n.remove();
            });
            return clone.innerHTML.trim();
        }

        /**
         * @param {string} content - assistant plain text (markdown)
         * @param {{ thinkingText?: string, toolsInnerHtml?: string, timelineHtml?: string }} [opts]
         */
        function addAssistantMessage(content, opts) {
            opts = opts || {};
            const wrap = document.createElement('div');
            wrap.className = 'message ai';
            const timelineHtml = String(opts.timelineHtml || '').trim();
            if (timelineHtml) {
                const tim = document.createElement('div');
                tim.className = 'stream-timeline-persist';
                tim.innerHTML = typeof DOMPurify !== 'undefined'
                    ? DOMPurify.sanitize(timelineHtml)
                    : timelineHtml;
                wrap.appendChild(tim);
            } else {
                const think = String(opts.thinkingText || '').trim();
                if (think) {
                    const th = document.createElement('div');
                    th.className = 'stream-thinking ai-thinking-persist';
                    th.setAttribute('aria-label', 'Thinking');
                    th.textContent = think;
                    wrap.appendChild(th);
                }
                const toolsHtml = String(opts.toolsInnerHtml || '').trim();
                if (toolsHtml) {
                    const tools = document.createElement('div');
                    tools.className = 'stream-tools msg-tools-persist';
                    tools.innerHTML = typeof DOMPurify !== 'undefined'
                        ? DOMPurify.sanitize(toolsHtml, { ADD_ATTR: ['aria-label'] })
                        : toolsHtml;
                    wrap.appendChild(tools);
                }
            }
            const body = document.createElement('div');
            body.className = 'md-body';
            body.innerHTML = renderAssistantMarkdown(content);
            wrap.appendChild(body);
            messageList.appendChild(wrap);
            scrollMessageListToBottom();
            return wrap;
        }

        function setHelpDrawerOpen(open) {
            cmdHelpToggle.setAttribute('aria-expanded', open ? 'true' : 'false');
            slashHelpDrawer.classList.toggle('open', open);
            if (open) setPiDrawerOpen(false);
        }

        function setPiDrawerOpen(open) {
            piFolderToggle.setAttribute('aria-expanded', open ? 'true' : 'false');
            piFolderDrawer.classList.toggle('open', open);
            if (open) setHelpDrawerOpen(false);
        }

        piFolderToggle.addEventListener('click', () => {
            const next = piFolderToggle.getAttribute('aria-expanded') !== 'true';
            setPiDrawerOpen(next);
        });

        cmdHelpToggle.addEventListener('click', () => {
            const next = cmdHelpToggle.getAttribute('aria-expanded') !== 'true';
            setHelpDrawerOpen(next);
        });

        clearChatBtn.addEventListener('click', () => { void clearContext(); });

        async function clearContext() {
            if (clearing) return;
            clearing = true;
            clearChatBtn.disabled = true;
            try {
                const r = await fetch(API_BASE + '/api/session/reset', {
                    method: 'POST',
                    credentials: 'same-origin',
                });
                const data = await r.json().catch(() => ({}));
                if (!r.ok) {
                    const d = data.detail != null
                        ? (typeof data.detail === 'string' ? data.detail : JSON.stringify(data.detail))
                        : 'Clear failed';
                    addMessage('system', d, false);
                    return;
                }
                conversationHistory = Array.isArray(data.messages) ? data.messages : [];
                renderFromServer(conversationHistory);
                let note = 'Conversation cleared.';
                if (data.pi_new_session_warning) {
                    note += ' Pi note: ' + data.pi_new_session_warning;
                }
                addMessage('system', note, false);
            } catch (e) {
                addMessage('system', e.message || 'Clear failed', false);
            } finally {
                clearing = false;
                clearChatBtn.disabled = false;
            }
        }

        function addMessage(role, htmlOrText, asHtml) {
            const div = document.createElement('div');
            div.className = 'message ' + role;
            div[asHtml ? 'innerHTML' : 'textContent'] = asHtml ? htmlOrText : htmlOrText;
            messageList.appendChild(div);
            scrollMessageListToBottom();
            return div;
        }

        function createStreamingAiShell() {
            const wrap = document.createElement('div');
            wrap.className = 'message ai stream-message';
            const timeline = document.createElement('div');
            timeline.className = 'stream-timeline';

            let lastKind = null;
            let thinkingBody = null;
            let replyBody = null;

            function updateReplyLabelVisibility() {
                const hasOther = timeline.querySelector('.stream-segment-thinking, .stream-segment-tool');
                timeline.querySelectorAll('.stream-segment-reply .stream-segment-label').forEach(function (lab) {
                    lab.hidden = !hasOther;
                });
            }

            function ensureThinkingSegment() {
                if (lastKind === 'thinking' && thinkingBody) return thinkingBody;
                const seg = document.createElement('div');
                seg.className = 'stream-segment stream-segment-thinking';
                const lab = document.createElement('div');
                lab.className = 'stream-segment-label';
                lab.textContent = 'Thinking';
                const body = document.createElement('div');
                body.className = 'stream-thinking-body';
                body.setAttribute('aria-label', 'Thinking');
                seg.appendChild(lab);
                seg.appendChild(body);
                timeline.appendChild(seg);
                lastKind = 'thinking';
                thinkingBody = body;
                replyBody = null;
                updateReplyLabelVisibility();
                return body;
            }

            function ensureReplySegment() {
                if (lastKind === 'reply' && replyBody) return replyBody;
                const seg = document.createElement('div');
                seg.className = 'stream-segment stream-segment-reply';
                const lab = document.createElement('div');
                lab.className = 'stream-segment-label';
                lab.textContent = 'Answer';
                const body = document.createElement('div');
                body.className = 'stream-main';
                seg.appendChild(lab);
                seg.appendChild(body);
                timeline.appendChild(seg);
                lastKind = 'reply';
                replyBody = body;
                thinkingBody = null;
                updateReplyLabelVisibility();
                return body;
            }

            function mountToolSegment(toolName, args) {
                const seg = document.createElement('div');
                seg.className = 'stream-segment stream-segment-tool';
                const lab = document.createElement('div');
                lab.className = 'stream-segment-label';
                lab.textContent = 'Tool';
                const block = document.createElement('div');
                block.className = 'stream-tool-block';
                const title = document.createElement('div');
                title.className = 'tool-name';
                const cmd = args && args.command ? String(args.command) : '';
                const name = toolName || 'tool';
                title.textContent = cmd ? (name + ': ' + cmd) : name;
                const pre = document.createElement('div');
                pre.className = 'tool-body';
                block.appendChild(title);
                block.appendChild(pre);
                seg.appendChild(lab);
                seg.appendChild(block);
                timeline.appendChild(seg);
                lastKind = 'tool';
                thinkingBody = null;
                replyBody = null;
                updateReplyLabelVisibility();
                return { seg: seg, block: block, pre: pre };
            }

            wrap.appendChild(timeline);
            messageList.appendChild(wrap);
            scrollMessageListToBottom();

            return {
                wrap: wrap,
                timeline: timeline,
                ensureThinkingSegment: ensureThinkingSegment,
                ensureReplySegment: ensureReplySegment,
                mountToolSegment: mountToolSegment,
                toolBlocks: new Map()
            };
        }

        function partialResultToText(pr) {
            if (!pr || !Array.isArray(pr.content)) return '';
            let s = '';
            for (const c of pr.content) {
                if (c && c.type === 'text' && typeof c.text === 'string') s += c.text;
            }
            return s;
        }

        function resultToText(result) {
            if (!result || !Array.isArray(result.content)) return '';
            return partialResultToText(result);
        }

        async function readNdjsonStream(body, onRecord) {
            const reader = body.getReader();
            const dec = new TextDecoder();
            let buf = '';
            while (true) {
                const { done, value } = await reader.read();
                if (value) buf += dec.decode(value, { stream: true });
                if (done) {
                    buf += dec.decode();
                    break;
                }
                for (;;) {
                    const nl = buf.indexOf('\n');
                    if (nl < 0) break;
                    const line = buf.slice(0, nl).trim();
                    buf = buf.slice(nl + 1);
                    if (!line) continue;
                    try {
                        onRecord(JSON.parse(line));
                    } catch (_) {}
                }
            }
            const tail = buf.trim();
            if (tail) {
                try {
                    onRecord(JSON.parse(tail));
                } catch (_) {}
            }
        }

        /**
         * @param {Array} messages
         * @param {{ lastAssistantThinking?: string, lastAssistantTools?: string, lastAssistantTimelineHtml?: string }} [streamOpts]
         *   When set, extras are shown only on the last assistant message (Pi stream not on server).
         */
        function renderFromServer(messages, streamOpts) {
            streamOpts = streamOpts || {};
            messageList.innerHTML = '';
            let shown = false;
            const assistantIndices = [];
            for (let i = 0; i < messages.length; i++) {
                if (messages[i] && messages[i].role === 'assistant') assistantIndices.push(i);
            }
            const lastAssistantIdx = assistantIndices.length ? assistantIndices[assistantIndices.length - 1] : -1;

            for (let i = 0; i < messages.length; i++) {
                const m = messages[i];
                if (!m || typeof m !== 'object') continue;
                if (m.role === 'system') continue;
                const c = m.content;
                if (typeof c !== 'string') continue;
                if (m.role === 'user') {
                    addMessage('user', c, false);
                    shown = true;
                } else if (m.role === 'assistant') {
                    const isLast = i === lastAssistantIdx;
                    const timelineH = isLast ? (streamOpts.lastAssistantTimelineHtml || '').trim() : '';
                    if (timelineH) {
                        addAssistantMessage(c, { timelineHtml: timelineH });
                    } else {
                        const think = isLast ? (streamOpts.lastAssistantThinking || '') : '';
                        const tools = isLast ? (streamOpts.lastAssistantTools || '') : '';
                        addAssistantMessage(c, {
                            thinkingText: think,
                            toolsInnerHtml: tools
                        });
                    }
                    shown = true;
                }
            }
            if (!shown) {
                addMessage('system', 'Same origin as this page — works behind ngrok or Cloudflare Tunnel.', false);
            }
        }

        /** @param {boolean} [skipRender] If true, only refresh conversationHistory (caller renders). */
        async function loadSession(skipRender) {
            try {
                const r = await fetch(API_BASE + '/api/session', { credentials: 'same-origin' });
                if (!r.ok) return;
                const data = await r.json();
                conversationHistory = Array.isArray(data.messages) ? data.messages : [];
                if (!skipRender) renderFromServer(conversationHistory);
            } catch (e) {
                console.error(e);
            }
        }

        function setConnected(ok, msg) {
            statusDot.classList.toggle('online', ok);
            statusDot.classList.toggle('offline', !ok);
            statusText.textContent = msg;
        }

        function harnessLabel() {
            return serverBackend === 'pi' ? 'Pi (RPC)' : 'Ollama';
        }

        function renderModelHarnessLine() {
            const m = selectedModel || '…';
            modelInfo.innerHTML = '<strong>' + escapeHtml(m) + '</strong> · <span class="text-muted">' + escapeHtml(harnessLabel()) + '</span>';
        }

        function selectModel(m) {
            selectedModel = m;
            localStorage.setItem('ollama_model', m);
            renderModelHarnessLine();
        }

        async function populateModels() {
            try {
                const response = await fetch(API_BASE + '/models');
                const data = await response.json();
                if (!response.ok || !Array.isArray(data.models)) {
                    setConnected(false, 'API error');
                    modelInfo.innerHTML = '<span class="text-error">Could not list models</span>';
                    statusBarEl.classList.remove('pi-mode');
                    piFolderBar.hidden = true;
                    return;
                }
                serverBackend = data.backend || 'ollama';
                if (serverBackend === 'pi' && data.pi_workspace) {
                    statusBarEl.classList.add('pi-mode');
                    piFolderBar.hidden = false;
                    piSubpathInput.value = data.pi_workspace.subpath || '';
                    const r = data.pi_workspace.root || '';
                    const eff = data.pi_workspace.effective || '';
                    piWorkspaceHint.textContent = r ? ('Root: ' + r + (eff && eff !== r ? ' · Now: ' + eff : '')) : '';
                } else {
                    statusBarEl.classList.remove('pi-mode');
                    piFolderBar.hidden = true;
                    setPiDrawerOpen(false);
                }
                availableModels = data.models.slice();
                const def = data.current_default || '';
                const ollamaDown = data.ollama_reachable === false;
                if (serverBackend === 'pi' && availableModels.length === 0 && def) {
                    availableModels = [def];
                }
                const saved = localStorage.getItem('ollama_model');
                if (saved && availableModels.includes(saved)) {
                    selectModel(saved);
                } else if (def && availableModels.includes(def)) {
                    selectModel(def);
                } else if (availableModels.length) {
                    selectModel(availableModels[0]);
                } else {
                    selectedModel = '';
                    if (ollamaDown) {
                        setConnected(false, 'Ollama not running');
                        modelInfo.innerHTML = '<span class="text-error">Ollama is not running or not reachable from the server (check OLLAMA_HOST).</span>';
                    } else {
                        setConnected(true, 'API up — no models');
                        modelInfo.innerHTML = '<span class="text-muted">' + (serverBackend === 'pi' ? 'Set LEASH_PI_COMMAND / pull a model for the provider' : 'Pull a model in Ollama') + '</span>';
                    }
                    return;
                }
                if (ollamaDown) {
                    setConnected(false, 'Ollama not running');
                    modelInfo.innerHTML = '<span class="text-error">Ollama is not running or not reachable. Leash is up, but the model runtime is down (start Ollama on the machine running Leash).</span>';
                } else {
                    setConnected(true, serverBackend === 'pi' ? 'Pi' : 'Connected');
                    renderModelHarnessLine();
                }
            } catch (err) {
                console.error(err);
                setConnected(false, 'Offline');
                modelInfo.innerHTML = '<span class="text-error">' + escapeHtml(err.message) + '</span>';
                statusBarEl.classList.remove('pi-mode');
                piFolderBar.hidden = true;
            }
        }

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            if (text.startsWith('/')) {
                const firstLine = text.split('\n').map(function (l) { return l.trim(); }).find(Boolean) || text;
                const parts = firstLine.trim().split(/\s+/);
                const cmd = parts[0].toLowerCase();
                input.value = '';
                if (cmd === '/clear' || cmd === '/reset') {
                    await clearContext();
                    return;
                }
                if (cmd === '/help' || cmd === '/commands') {
                    setHelpDrawerOpen(true);
                    return;
                }
                if (busy) return;
                addMessage('system', 'Unknown command: ' + cmd + '. Try /help or tap ?.', false);
                return;
            }

            if (busy || !selectedModel) return;

            input.value = '';
            busy = true;
            sendBtn.disabled = true;
            input.disabled = true;
            setConnected(true, 'Thinking…');

            addMessage('user', text, false);
            const shell = createStreamingAiShell();
            try {
                const response = await fetch(API_BASE + '/api/chat/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify({
                        content: text,
                        model: selectedModel
                    })
                });

                if (!response.ok) {
                    const raw = await response.text();
                    let data = {};
                    try {
                        data = raw ? JSON.parse(raw) : {};
                    } catch (_) {}
                    shell.wrap.remove();
                    const userMsgs = messageList.querySelectorAll('.message.user');
                    if (userMsgs.length) userMsgs[userMsgs.length - 1].remove();
                    await loadSession();
                    const detail = data.detail != null
                        ? (typeof data.detail === 'string' ? data.detail : JSON.stringify(data.detail))
                        : raw || ('HTTP ' + response.status);
                    addMessage('system', detail, false);
                    return;
                }

                if (!response.body) {
                    shell.wrap.remove();
                    const userMsgs = messageList.querySelectorAll('.message.user');
                    if (userMsgs.length) userMsgs[userMsgs.length - 1].remove();
                    await loadSession();
                    addMessage('system', 'No response body', false);
                    return;
                }

                let donePayload = null;
                let streamErr = null;
                await readNdjsonStream(response.body, function (o) {
                    if (!o || typeof o !== 'object') return;
                    if (o.event === 'delta' && o.text) {
                        const main = shell.ensureReplySegment();
                        main.textContent += o.text;
                        maybeFollowStream();
                    } else if (o.event === 'thinking' && o.text) {
                        const th = shell.ensureThinkingSegment();
                        th.textContent += o.text;
                        maybeFollowStream();
                    } else if (o.event === 'tool') {
                        const id = String(o.toolCallId != null ? o.toolCallId : o.toolName || '_');
                        const phase = o.phase;
                        const name = o.toolName || 'tool';
                        if (phase === 'start') {
                            shell.toolBlocks.set(id, { pending: true, toolName: name, args: o.args });
                        } else if (phase === 'update') {
                            let row = shell.toolBlocks.get(id);
                            if (!row) {
                                shell.toolBlocks.set(id, { pending: true, toolName: name, args: o.args });
                                row = shell.toolBlocks.get(id);
                            }
                            if (row && row.pending) {
                                const ui = shell.mountToolSegment(row.toolName || name, row.args || o.args);
                                shell.toolBlocks.set(id, Object.assign({ pending: false }, ui));
                                row = shell.toolBlocks.get(id);
                            }
                            if (row && row.pre && o.partialResult) {
                                row.pre.textContent = partialResultToText(o.partialResult);
                            }
                            maybeFollowStream();
                        } else if (phase === 'end') {
                            let row = shell.toolBlocks.get(id);
                            if (!row) {
                                shell.toolBlocks.set(id, { pending: true, toolName: name, args: o.args });
                                row = shell.toolBlocks.get(id);
                            }
                            if (row && row.pending) {
                                const ui = shell.mountToolSegment(name, o.args);
                                shell.toolBlocks.set(id, Object.assign({ pending: false }, ui));
                                row = shell.toolBlocks.get(id);
                            }
                            if (row && row.pre) {
                                const txt = resultToText(o.result);
                                if (txt) row.pre.textContent = txt;
                            }
                            maybeFollowStream();
                        }
                    } else if (o.event === 'done') {
                        donePayload = o;
                    } else if (o.event === 'error') {
                        streamErr = typeof o.detail === 'string' ? o.detail : JSON.stringify(o.detail || o);
                    }
                });

                if (streamErr) {
                    throw new Error(streamErr);
                }
                const timelineSnap = timelinePersistHtml(shell.timeline);
                if (!donePayload || !Array.isArray(donePayload.messages)) {
                    await loadSession(true);
                } else {
                    conversationHistory = donePayload.messages;
                }
                shell.wrap.remove();
                renderFromServer(conversationHistory, {
                    lastAssistantTimelineHtml: timelineSnap
                });
            } catch (err) {
                console.error(err);
                shell.wrap.remove();
                const userMsgs = messageList.querySelectorAll('.message.user');
                if (userMsgs.length) userMsgs[userMsgs.length - 1].remove();
                await loadSession();
                addMessage('system', err.message || 'Request failed', false);
            } finally {
                busy = false;
                sendBtn.disabled = false;
                input.disabled = false;
                updateScrollDownHint();
                void populateModels();
            }
        }

        piSubpathBtn.addEventListener('click', async () => {
            if (serverBackend !== 'pi' || busy) return;
            const sub = piSubpathInput.value.trim();
            piSubpathBtn.disabled = true;
            try {
                const response = await fetch(API_BASE + '/api/pi/cwd', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify({ subpath: sub }),
                });
                const raw = await response.text();
                let data = {};
                try {
                    data = raw ? JSON.parse(raw) : {};
                } catch (_) {}
                if (!response.ok) {
                    const detail = typeof data.detail === 'string' ? data.detail : (raw || ('HTTP ' + response.status));
                    addMessage('system', detail, false);
                    return;
                }
                addMessage('system', 'Pi restarted in: ' + (data.effective || sub), false);
                void populateModels();
            } catch (err) {
                addMessage('system', err.message || 'Request failed', false);
            } finally {
                piSubpathBtn.disabled = false;
            }
        });

        sendBtn.addEventListener('click', sendMessage);
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (!input.disabled) sendMessage();
            }
        });

        (async function init() {
            await populateModels();
            await loadSession();
            updateScrollDownHint();
        })();
    </script>
</body>
</html>
